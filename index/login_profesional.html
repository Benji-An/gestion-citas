<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Health In The Pearl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="../frontend/public/logo4.png">
    <link rel="stylesheet" href="../frontend/src/index.css">

<body>
    <div class="form-container">
    <!-- Logo -->
    <div class="logo flex items-center justify-center mb-6">
        <img src="../frontend/public/logo2.png" alt="">
    </div>
        <h2 class="text-2xl font-bold text-center mb-2">Gestor de Citas</h2>
        <p class="text-gray-600 text-center mb-6 text-sm">Agenda y administra citas de manera fácil y organizada</p>
        <!-- Login Form -->
        <div id="login-form" class="form-section active">
            <form onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Email</label>
                    <input type="email" class="input-field" placeholder="tu@email.com" required>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Contraseña</label>
                    <input type="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Iniciar Sesión</button>

                <div class="text-center mt-4">
                    <a href="#" class="text-sm text-green-600 hover:text-green-700">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>
    <footer>
        <p class="text-center text-gray-400 text-sm mt-6">© 2025 Health In The Pearl. Todos los derechos reservados.</p>
    </footer>
    <script>
        function showTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const forms = document.querySelectorAll('.form-section');
            
            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
        // Manejar login
        function handleLogin(e) {
            e.preventDefault();
            alert('¡Inicio de sesión exitoso! Redirigiendo al panel de control...');
            // Aquí iría la lógica de autenticación real
        }
    </script>
</body>
</html>
