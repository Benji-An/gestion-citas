<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Header</title>
</head>
<body>
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-full mx-auto px-6 sm:px-8 lg:px-12 py-4">
            <div class="flex justify-between items-center">
                <div class="logo1 flex items-center">
                    <img src="/frontend/public/logo2.png" alt="Health In The Pearl Logo">
                </div>
                <div class="flex items-center space-x-3">
                    <div class="text-right">
                        <div class="text-sm font-semibold" id="userName"></div>
                        <div class="text-xs text-gray-500" id="userRole">Cliente</div>
                    </div>
                    <button onclick="handleLogout()" class="p-2 hover:bg-gray-100 rounded-lg transition" aria-label="Cerrar sesión">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <script>
        // Obtener el nombre del usuario del localStorage o sessionStorage
        document.addEventListener('DOMContentLoaded', function() {
            const userName = localStorage.getItem('userName') || 'Usuario';
            document.getElementById('userName').textContent = userName;
        });

        // Función para cerrar sesión
        function handleLogout() {
            // Limpiar el localStorage
            localStorage.clear();
            // Redirigir al login
            window.location.href = '../pages/login_usuario.html';
        }
    </script>
</body>
</html>
